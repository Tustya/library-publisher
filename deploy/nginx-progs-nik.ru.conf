# Reverse proxy для приложения Библиотека (frontend в Docker на 127.0.0.1:8080).
# HTTPS через Let's Encrypt. Сертификаты: certbot certonly --standalone -d progs-nik.ru -d www.progs-nik.ru
# Установка: sudo cp deploy/nginx-progs-nik.ru.conf /etc/nginx/sites-available/progs-nik.ru
#           sudo ln -sf /etc/nginx/sites-available/progs-nik.ru /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx

# Редирект HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name progs-nik.ru www.progs-nik.ru;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name progs-nik.ru www.progs-nik.ru;

    ssl_certificate     /etc/letsencrypt/live/progs-nik.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/progs-nik.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
